name: Bug report
description: Report a defect, regression, or packaging problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: A clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Desktop UI
        - Windows packaging
        - Linux packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "Example: 0.1.2"

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, and any other relevant details
      placeholder: |
        OS:
        Rust:
        Notes:

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste error output or attach screenshots if helpful

