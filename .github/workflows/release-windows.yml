name: release-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\package_installer_windows.ps1

      - name: Archive portable Windows bundle
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $zipPath = "dist/windows/SimpleSteelCalculator-$version-portable.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "dist/windows/SimpleSteelCalculator/*" -DestinationPath $zipPath

      - name: Ensure GitHub Release exists
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Upload installer and portable zip to GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $installer = Get-ChildItem "compile/Output/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Installer not found under compile/Output"
          }
          $portableZip = Get-Item "dist/windows/SimpleSteelCalculator-$version-portable.zip"
          gh release upload $tag $installer.FullName $portableZip.FullName --clobber
