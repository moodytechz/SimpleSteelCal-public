name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          if ! gh release view "$tag" -R "$repo" >/dev/null 2>&1; then
            gh release create "$tag" -R "$repo" --title "$tag" --generate-notes
          fi

  build-windows:
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\package_installer_windows.ps1

      - name: Archive portable Windows bundle
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $zipPath = "dist/windows/SimpleSteelCalculator-$version-portable.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "dist/windows/SimpleSteelCalculator/*" -DestinationPath $zipPath

      - name: Upload Windows assets to GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $repo = "${{ github.repository }}"
          $installer = Get-ChildItem "compile/Output/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Installer not found under compile/Output"
          }
          $portableZip = Get-Item "dist/windows/SimpleSteelCalculator-$version-portable.zip"
          gh release upload $tag $installer.FullName $portableZip.FullName --clobber --repo $repo

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev

      - name: Package Linux release archive
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash package_unix_release.sh linux "$version"

      - name: Upload Linux archive to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          version="${tag#v}"
          arch="$(uname -m)"
          archive="dist/linux/SimpleSteelCalculator-${version}-linux-${arch}.tar.gz"
          gh release upload "$tag" "$archive" --clobber --repo "$repo"

  build-macos:
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Package macOS release archive
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash package_unix_release.sh macos "$version"

      - name: Upload macOS archive to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          version="${tag#v}"
          arch="$(uname -m)"
          archive="dist/macos/SimpleSteelCalculator-${version}-macos-${arch}.tar.gz"
          gh release upload "$tag" "$archive" --clobber --repo "$repo"
